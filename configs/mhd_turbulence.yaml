# ==============================================================================
#  ScaleAware-JEPA Configuration File: MHD Turbulence & Scalar Continuums
# ==============================================================================

data:
  data_root: "data"
  npy_pattern: "C12_Beta20_256_0060-rho.npy_slice.npy_sm_0.5.npy"
  num_samples: 200

  # Preprocessing & Transformations
  log_eps: 1e-06
  post_log_transform: true

  # Slicing strategies for volumetric/cube datasets
  cube_slice_strategy: "center"
  cube_slice_axis: 0
  cube_slice_index: 0
  crop_mode: "none"

  # Data Augmentation (D4 = Dihedral group; preserves physical isotropy via rotations/flips)
  random_roll_max: 0
  d4_augment: true

# ------------------------------------------------------------------------------
#  Mathematical Core: Constrained Diffusion Decomposition (CDD) & Scale Engine
# ------------------------------------------------------------------------------
cdd_scale_space:
  cdd_mode: "log"
  cdd_constrained: true
  cdd_sm_mode: "reflect"
  cdd_log_std_floor_mult: 0.05
  cdd_append_last_residual: true

  # The physical scale boundaries (Diffusion coefficients / smoothing radii)
  sigmas: [2, 4, 8, 16]
  align_scales: true

# ------------------------------------------------------------------------------
#  Neural Network Architecture (Encoders & Predictors)
# ------------------------------------------------------------------------------
model:
  mode: "pyramid"
  model_key: "cdd_scaleaware_convnext"

  # Feature Map Dimensionality
  encoder_width: 64
  encoder_depth: 4
  encoder_kernel_size: 7
  latent_channels: 32

  # Cross-Scale Multi-Scale Fusion Mechanics
  scaleaware_feat_channels: 8
  scaleaware_adapter_kernel_size: 3
  scaleaware_fusion_type: "topdown"

  # Normalization Topology
  scaleaware_norm_per_scale: true
  scaleaware_final_norm: true
  scaleaware_stem_norm: true
  global_shift: false

# ------------------------------------------------------------------------------
#  Hierarchical Masking & Target Posing
# ------------------------------------------------------------------------------
masking:
  patch_size: 3
  mask_spacing_scaling: 2.0
  mask_size_scaling: 1.0
  mask_size: 0

  # Target Sampling Strategy
  target_sampling_mode: "random"
  active_target_fraction: 1.0
  target_nonoverlap: true
  target_allow_partial_overlap: 0.0
  target_invalid_region_skip: true

# ------------------------------------------------------------------------------
#  Optimization, Regularization & Non-Collapse Mechanics
# ------------------------------------------------------------------------------
training:
  batch_size: 4
  lr: 0.0001
  weight_decay: 1e-05
  num_workers: 4
  symmetry_loss_weight: 0
  normalize_loss_l2: false

  # Target Network Exponential Moving Average (EMA) Scheduling
  ema_momentum: 0.996
  ema_momentum_base: 0.996
  ema_momentum_final: 1.0

  # Predictor Layer Topologies
  predictor_layernorm: true
  predictor_residual: false

  # Variance-Based Non-Collapse Constraint (Crucial for Energy-Based JEPAs)
  spread_regularizer:
    type: "std_hinge"
    target: "predictor"
    weight: 2
    target_std: 1.0
    eps: 0.0001

# ------------------------------------------------------------------------------
#  Diagnostics & Visualization Hooks
# ------------------------------------------------------------------------------
diagnostics:
  compute_effective_rank: true
  viz_crop_border: true

  # Real-time manifold projection parameters
  umap:
    metric: "euclidean"
    standardize: true
    l2_normalize: false
    n_neighbors: 50
    min_dist: 0.2
