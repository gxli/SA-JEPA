data:
  data_root: data
  npy_pattern: C12_Beta20_256_0060-rho.npy_slice.npy_sm_0.5.npy
  num_samples: 200
  log_eps: 1.0e-06
  cdd_mode: log
  cdd_constrained: true
  cdd_sm_mode: reflect
  cube_slice_strategy: center
  cube_slice_axis: 0
  cube_slice_index: 0
  crop_mode: none
  random_roll_max: 0
  d4_augment: true
cdd_scale_space:
  cdd_mode: log
  cdd_constrained: true
  cdd_sm_mode: reflect
  cdd_log_std_floor_mult: 0.05
  cdd_append_last_residual: true
  sigmas:
  - 2
  - 4
  - 8
  - 16
  align_scales: true
model:
  mode: pyramid
  model_key: cdd_scaleaware_convnext
  encoder_width: 64
  encoder_depth: 4
  encoder_kernel_size: 7
  latent_channels: 32
  scaleaware_feat_channels: 8
  scaleaware_adapter_kernel_size: 3
  scaleaware_fusion_type: topdown
  scaleaware_norm_per_scale: true
  scaleaware_final_norm: true
  scaleaware_stem_norm: true
  global_shift: false
  normalize_loss_l2: false
  predictor_layernorm: true
  predictor_spatial_conv: true
  predictor_hidden: 96
  predictor_residual: false
  use_grn: true
  post_log_transform: true
  use_symmetric_feature_loss: true
  ema_momentum: 0.996
  scaleaware_adapter_norm: true
masking:
  patch_size: 3
  mask_spacing_scaling: 2.0
  mask_size_scaling: 1.0
  mask_size: 0
  target_sampling_mode: random
  active_target_fraction: 1.0
  target_nonoverlap: true
  target_allow_partial_overlap: 0.0
  target_invalid_region_skip: true
  priority_top_percent: 100
  priority_n_target: auto
  priority_min_targets_per_map: 10
  priority_dithering_pixels: 6
  priority_candidate_oversample: 0
training:
  batch_size: 4
  lr: 0.0001
  weight_decay: 1.0e-05
  num_workers: 8
  epochs: 10
  symmetry_loss_weight: 0.003
  ema_momentum_base: 0.99
  ema_momentum_final: 0.9999
  spread_regularizer:
    type: std_hinge
    target: context
    weight: 2
    target_std: 1.0
    eps: 0.0001
  mse_loss_weight: 50
  vicreg_spatial_mode: pooled
  scale_probe_enabled: true
  inference_tta_enabled: true
  inference_tta_mode: flip4
diagnostics:
  compute_effective_rank: true
  viz_crop_border: true
  umap:
    metric: euclidean
    standardize: true
    l2_normalize: false
    n_neighbors: 50
    min_dist: 0.2
